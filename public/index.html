<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Escala de Atendimento - Dashboard</title>
    <script>
    (function () {
        try {
            var theme = localStorage.getItem('escala-theme') === 'dark' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    })();
    </script>
    <link rel="stylesheet" href="assets/css/app.css">
    <link rel="icon" type="image/svg+xml" href="assets/img/brand-avatar.svg">
</head>
<body data-page="dashboard">
<header class="sidebar no-print">
    <div class="brand">
        <div class="brand-identity">
            <img class="brand-photo" src="assets/img/brand-avatar.svg" alt="Identidade visual Escala de Atendimento">
            <div>
                <h1>Escala de Atendimento</h1>
                <small>Operacao FDS e feriados</small>
            </div>
        </div>
    </div>
    <nav class="main-nav">
        <a class="nav-link active" href="index.html">Dashboard</a>
        <a class="nav-link" href="collaborators.html">Colaboradores</a>
        <a class="nav-link" href="events.html">Eventos</a>
    </nav>
    <div class="theme-switcher">
        <label for="themeSelect">Tema</label>
        <select id="themeSelect" aria-label="Selecionar tema">
            <option value="light">Claro</option>
            <option value="dark">Escuro</option>
        </select>
    </div>
</header>

<main class="container with-sidebar">
    <div id="flashHost"></div>

    <section class="cards">
        <article class="card">
            <h3>Colaboradores</h3>
            <p id="cardCollaborators">0</p>
        </article>
        <article class="card">
            <h3>Ativos</h3>
            <p id="cardActive">0</p>
        </article>
        <article class="card">
            <h3>Eventos</h3>
            <p id="cardEvents">0</p>
        </article>
        <article class="card">
            <h3>Linhas de Escala</h3>
            <p id="cardShifts">0</p>
        </article>
    </section>

    <section>
        <h2>Proximos eventos</h2>
        <table>
            <thead>
            <tr>
                <th>Data</th>
                <th>Tipo</th>
                <th>Label</th>
                <th>Acoes</th>
            </tr>
            </thead>
            <tbody id="nextEventsBody">
            <tr><td colspan="4">Carregando...</td></tr>
            </tbody>
        </table>
    </section>
</main>

<script type="module" src="assets/js/app.js"></script>
</body>
</html>
